<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚠️ 警告 ⚠️</title>
    <!-- 解决favicon.ico 404（可选，加个空图标链接即可） -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1 1'></svg>" sizes="1x1">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            height: 100vh;
            background: linear-gradient(45deg, #ff0000, #ffff00, #ff00ff, #00ffff, #ff0000);
            background-size: 400% 400%;
            animation: bgShake 0.3s infinite alternate;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            cursor: none;
        }
        @keyframes bgShake {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }
        .regret-text {
            font-size: 120px;
            font-weight: 900;
            color: #fff;
            text-shadow: 
                0 0 10px #ff0000, 0 0 20px #ff0000,
                0 0 30px #ffff00, 0 0 40px #ffff00,
                0 0 50px #ff00ff;
            animation: textDance 0.15s infinite alternate;
        }
        @keyframes textDance {
            0% { transform: translate(-5px, -5px) rotate(-2deg) scale(1); }
            100% { transform: translate(5px, 5px) rotate(2deg) scale(1.1); }
        }
    </style>
</head>
<body>
    <div class="regret-text">你太高冷了</div>

    <script>
        alert("⚠️ 你已经成功触发后悔模式！");
        
        // 页面震动
        let shake = 0;
        setInterval(() => {
            shake = shake ? 0 : 5;
            document.body.style.margin = `${shake}px`;
        }, 50);

        // Edge专属：最强自动播放逻辑
        const audio = new Audio("1.mp3");
        audio.loop = true;
        audio.volume = 1;
        audio.muted = true; // 第一步：强制静音

        // 第二步：多事件触发播放（覆盖Edge的所有触发规则）
        async function playAudio() {
            try {
                await audio.play();
                audio.muted = false; // 播放后取消静音
                console.log("Edge音频全自动播放成功！");
            } catch (err) {
                console.log("备用触发：点击/按任意键播放");
                // 备用方案：点击/按键都能播放
                document.addEventListener('click', () => { audio.play(); audio.muted = false; }, { once: true });
                document.addEventListener('keydown', () => { audio.play(); audio.muted = false; }, { once: true });
            }
        }

        // 第三步：同时用多个时机触发（确保Edge能捕获）
        window.addEventListener('load', playAudio); // 页面加载
        window.addEventListener('DOMContentLoaded', playAudio); // DOM加载完成
        setTimeout(playAudio, 500); // 延迟500ms兜底
    </script>
</body>
</html>
